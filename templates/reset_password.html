{% extends 'base.html' %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card light-card narrow">
    <div class="brand brand-center"><img class="brand-logo" src="/static/branding/dragonne-wordmark.png" alt="DRAGONNÉ" /></div>
    <h1>Define una nueva contraseña</h1>
    <p class="muted center">Cuídala; es la que usarás para entrar a tus análisis.</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    {% if token %}
    <form method="post" action="{{ url_prefix }}/reset-password" class="auth-form">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>Nueva contraseña</label>
      <input type="password" name="password" minlength="8" required />
      <label>Confirma la nueva contraseña</label>
      <input type="password" name="password_confirm" minlength="8" required />
      <button class="btn btn-primary full" type="submit">Guardar y entrar</button>
    </form>
    {% else %}
    <div class="mini-highlight">
      <p>El enlace ya no es válido. Vuelve a solicitar uno desde <a href="/forgot-password">Recuperar contraseña</a>.</p>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
