<style>
  .cp *{box-sizing:border-box}
  .cp{
    --text:#343434;--muted:#6b7280;--line:rgba(52,52,52,0.1);--dark:#1a1a1a;
    --accent:#f07e07;--accent-gold:#f6a905;
    color:var(--text);
    background:#fff;
    min-height:100vh;
    font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .cp a{text-decoration:none}
  .cp-skip{position:absolute;left:-9999px;z-index:999;padding:12px 20px;background:#343434;color:#fff;font-weight:600;border-radius:0 0 12px 0}
  .cp-skip:focus{left:0;top:0;outline:2px solid #f07e07;outline-offset:2px}
  .cpc{width:min(1100px,calc(100% - 48px));margin:0 auto}
  .cp-nav-wrap{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--line);padding:0 24px}
  .cp-nav{max-width:1200px;margin:0 auto;display:flex;align-items:center;min-height:64px;gap:40px}
  .cp-nav-left{display:flex;align-items:center;gap:16px;flex-shrink:0}
  .cp-brand{display:flex;align-items:center;font-weight:700;letter-spacing:-.03em;color:var(--dark)}
  .cp-brand img{height:34px;width:auto;display:block}
  .cp-nav-links{display:flex;align-items:center;gap:32px;flex:1;justify-content:center}
  .cp-nav-links a{color:var(--text);font-size:.9375rem;font-weight:500;letter-spacing:-.01em;white-space:nowrap;transition:color .2s;opacity:.88}
  .cp-nav-links a:hover{opacity:1;color:var(--text)}
  .cp-nav-item{position:relative;align-self:center}
  .cp-nav-dropdown-btn{
    background:none;border:0;padding:0;font:inherit;font-size:.9375rem;font-weight:500;letter-spacing:-.01em;
    color:var(--text);opacity:.88;cursor:pointer;white-space:nowrap;transition:opacity .2s,color .2s
  }
  .cp-nav-dropdown-btn:hover,.cp-nav-item:focus-within .cp-nav-dropdown-btn{opacity:1;color:var(--text)}
  .cp-nav-sub{
    display:none;position:absolute;left:0;top:100%;margin-top:10px;min-width:240px;padding:8px 0;background:#fff;
    border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,.08);z-index:102
  }
  @media (min-width:968px){
    .cp-nav-item::after{
      content:"";
      position:absolute;
      left:0;
      width:100%;
      height:12px;
      top:100%;
      z-index:103;
    }
  }
  .cp-nav-item:hover .cp-nav-sub,.cp-nav-item:focus-within .cp-nav-sub{display:block}
  .cp-nav-sub a,.cp-nav-sub .cp-nav-soon{display:block;padding:10px 16px;font-size:.9rem;font-weight:500;color:var(--text);opacity:1}
  .cp-nav-sub a:hover{color:var(--accent)}
  .cp-nav-sub a[aria-current="page"]{color:var(--accent);font-weight:600}
  .cp-nav-sub-group{padding:4px 0 8px;margin-bottom:4px;border-bottom:1px solid rgba(52,52,52,.08)}
  .cp-nav-sub > .cp-nav-sub-group:first-child{padding-top:0}
  .cp-nav-sub > .cp-nav-sub-group:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
  .cp-nav-sub-group-title{
    display:block;padding:8px 16px 6px;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)
  }
  .cp-nav-sub-group a{padding:8px 16px 8px 22px;font-size:.88rem}
  .cp-nav-mobile .cp-nav-mobile-sub{display:block;padding:10px 16px 10px 28px;font-size:.94rem;font-weight:500;color:var(--text);border-bottom:1px solid var(--line)}
  .cp-nav-soon{color:var(--muted);cursor:default;opacity:.55}
  .cp-nav-right{display:flex;align-items:center;gap:24px;flex-shrink:0}
  .cp-lang{display:flex;align-items:center;gap:8px;font-size:.8125rem;font-weight:600;letter-spacing:.02em}
  .cp-lang-link{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:32px;padding:0 10px;border-radius:999px;color:var(--muted);transition:color .2s,background .2s}
  .cp-lang-link:hover{color:var(--text)}
  .cp-lang-link.is-active{background:var(--dark);color:#fff}
  .cp-actions{display:flex;align-items:center;gap:14px}
  .cp-actions .cp-btn{min-height:42px;padding:0 20px;font-size:.9rem}
  .cp-btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 24px;border-radius:8px;font-weight:600;font-size:.95rem;border:1px solid transparent;transition:all .2s ease}
  .cp-btn:hover{transform:translateY(-1px)}
  .cp-btn:focus-visible,.cp-nav-dropdown-btn:focus-visible{outline:2px solid #f07e07;outline-offset:2px}
  .cp-btn-primary,.cp-btn-primary:visited{
    background:linear-gradient(90deg,var(--accent-gold),var(--accent)) !important;
    color:#fff !important;
    box-shadow:0 12px 28px rgba(240,126,7,.28);
  }
  .cp-btn-primary:hover{box-shadow:0 16px 36px rgba(240,126,7,.38)}
  .cp-btn-outline,.cp-btn-outline:visited{background:transparent !important;border:1px solid var(--text);color:var(--text) !important}

  .cp-hero h1{
    font-size:clamp(2.5rem,5vw,4rem);
    line-height:1.1;
    letter-spacing:-.04em;
    margin:0 auto 28px;
    max-width:14ch;
    font-weight:800;
    background:linear-gradient(90deg,var(--accent-gold),var(--accent));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .cp-hero-tagline{font-size:1.25rem;line-height:1.6;color:var(--muted);margin:0 auto 40px;max-width:480px;font-weight:450}
  .cp-hero-actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  .cp-hero-actions .cp-btn-outline{color:var(--muted);border-color:var(--muted)}
  .cp-hero-actions .cp-btn-outline:hover{color:var(--text);border-color:var(--text)}

  /* Hero: fondo tablero + destellos naranjas con motion */
  .cp-hero-wrap{
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.98), transparent 35%),
      radial-gradient(circle at 80% 80%, rgba(253,248,240,.9), transparent 35%),
      linear-gradient(180deg, #fbfcfe 0%, #f8f9fc 50%, #f5f7fb 100%);
  }
  .cp-hero-wrap::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(52,52,52,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52,52,52,.04) 1px, transparent 1px);
    background-size:32px 32px;
  }
  .cp-hero-wrap::after{
    content:"";
    position:absolute;
    inset:-25%;
    z-index:0;
    pointer-events:none;
    width:150%;
    height:150%;
    left:-25%;
    top:-25%;
    background:
      radial-gradient(ellipse 40% 40% at 15% 25%, rgba(246,169,5,.22), transparent 50%),
      radial-gradient(ellipse 35% 45% at 82% 78%, rgba(240,126,7,.18), transparent 52%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(246,169,5,.1), transparent 58%),
      radial-gradient(ellipse 30% 30% at 85% 18%, rgba(255,200,100,.2), transparent 48%),
      radial-gradient(ellipse 28% 35% at 12% 72%, rgba(246,180,80,.16), transparent 48%);
    background-size:100% 100%;
    background-repeat:no-repeat;
    animation:cp-destellos-mueven 24s ease-in-out infinite;
  }
  @keyframes cp-destellos-mueven {
    0%   { transform: translate(0, 0) scale(1); }
    15%  { transform: translate(5%, -2%) scale(1.04); }
    30%  { transform: translate(2%, 4%) scale(0.98); }
    45%  { transform: translate(-4%, 3%) scale(1.03); }
    60%  { transform: translate(-5%, -3%) scale(0.97); }
    75%  { transform: translate(-2%, -5%) scale(1.02); }
    90%  { transform: translate(3%, -2%) scale(0.99); }
    100% { transform: translate(0, 0) scale(1); }
  }
  .cp-hero{position:relative;z-index:1;padding:100px 0 120px;text-align:center}

  .cp-section{padding:80px 0}
  .cp-section--dark{background:var(--dark);color:#fff;padding:80px 0}
  .cp-section--dark .cp-section-title,.cp-section--dark .cp-section-lead,.cp-section--dark .cp-vert h4,.cp-section--dark .cp-vert p,.cp-section--dark .cp-vert li{color:rgba(255,255,255,.9)}
  .cp-section--dark .cp-section-lead,.cp-section--dark .cp-vert p,.cp-section--dark .cp-vert li{opacity:.85}
  .cp-section--muted{background:#fafafa;border-top:1px solid var(--line)}
  .cp-section-hero{text-align:center;margin-bottom:56px;max-width:600px;margin-left:auto;margin-right:auto}
  .cp-section-label{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  .cp-section-title{font-size:clamp(1.85rem,3vw,2.5rem);line-height:1.2;letter-spacing:-.04em;margin:0 0 16px;color:var(--dark);font-weight:800}
  .cp-section-lead{margin:0;font-size:1.05rem;line-height:1.7;color:var(--muted)}

  .cp-cards{display:grid;gap:24px}
  @media (min-width:768px){.cp-cards{grid-template-columns:repeat(3,1fr)}}
  .cp-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:32px;transition:border-color .2s,box-shadow .2s}
  .cp-card:hover{border-color:rgba(52,52,52,.2);box-shadow:0 12px 40px rgba(0,0,0,.06)}
  .cp-card-num{font-size:2rem;font-weight:800;letter-spacing:-.04em;color:var(--accent);margin-bottom:16px;line-height:1}
  .cp-card h3{font-size:1.15rem;letter-spacing:-.02em;margin:0 0 10px;color:var(--dark);font-weight:700}
  .cp-card p{color:var(--muted);line-height:1.6;margin:0;font-size:.94rem}

  .cp-vert-grid{display:grid;gap:24px}
  @media (min-width:768px){.cp-vert-grid{grid-template-columns:repeat(2,1fr)}}
  @media (min-width:1024px){.cp-vert-grid{grid-template-columns:repeat(4,1fr)}}
  .cp-vert{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:28px}
  .cp .cp-section--muted .cp-vert{background:#fff;border-color:var(--line)}
  .cp-vert h4{font-size:1.12rem;font-weight:700;letter-spacing:-.02em;margin:0 0 12px;color:inherit}
  .cp-vert p{font-size:.92rem;line-height:1.6;margin:0 0 16px}
  .cp-vert ul{margin:0;padding:0;list-style:none}
  .cp-vert li{position:relative;padding-left:16px;margin-bottom:8px;font-size:.9rem;line-height:1.55;color:inherit;opacity:.9}
  .cp-vert li::before{content:"";position:absolute;left:0;top:.5em;width:5px;height:5px;border-radius:50%;background:var(--accent)}

  .cp-portfolio-title{font-size:clamp(1.5rem,2.5vw,2rem);font-weight:800;letter-spacing:-.03em;margin:0 0 48px;text-align:center;color:var(--dark)}
  .cp-logo-strip{
    --cp-logo-gap-row:22px;
    --cp-logo-gap-col:16px;
    --cp-logo-cols:2;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:stretch;
    gap:var(--cp-logo-gap-row) var(--cp-logo-gap-col);
    list-style:none;
    margin:0;
    padding:0;
    width:100%;
  }
  @media (min-width:768px){
    .cp-logo-strip{
      --cp-logo-gap-row:28px;
      --cp-logo-gap-col:24px;
      --cp-logo-cols:3;
    }
  }
  .cp-logo-slot{
    flex:0 1 calc((100% - (var(--cp-logo-cols) - 1) * var(--cp-logo-gap-col)) / var(--cp-logo-cols));
    max-width:calc((100% - (var(--cp-logo-cols) - 1) * var(--cp-logo-gap-col)) / var(--cp-logo-cols));
    min-width:0;
    box-sizing:border-box;
    display:flex;
    align-items:stretch;
    justify-content:center;
  }
  .cp-logo-slot__frame{
    width:100%;
    height:76px;
    box-sizing:border-box;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:12px 14px;
  }
  @media (min-width:768px){
    .cp-logo-slot__frame{
      height:92px;
      padding:16px 20px;
    }
  }
  .cp-logo-slot__img{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    object-position:center;
    display:block;
  }
  .cp-logo-slot--pending .cp-logo-slot__frame{
    border:1px solid var(--line);
    border-radius:8px;
    background:rgba(255,255,255,.9);
  }
  .cp-logo-slot__pending-label{
    font-size:.8125rem;
    font-weight:600;
    letter-spacing:-.02em;
    color:var(--muted);
    text-align:center;
    line-height:1.25;
    padding:0 6px;
  }

  .cp-words{max-width:720px;margin:0 auto}
  .cp-words-grid{display:grid;gap:32px}
  @media (min-width:640px){.cp-words-grid{grid-template-columns:repeat(2,1fr)}}
  .cp-word{padding:24px 0;border-top:1px solid var(--line)}
  .cp-word:first-child{border-top:0;padding-top:0}
  .cp-word-quote{font-size:1.1rem;line-height:1.65;color:var(--dark);margin:0 0 16px;font-weight:500}
  .cp-word-author{font-size:.9rem;color:var(--muted)}

  .cp-method{display:grid;gap:24px}
  @media (min-width:768px){.cp-method{grid-template-columns:repeat(4,1fr)}}
  .cp-method-step{text-align:center;padding:0 12px}
  .cp-method-num{display:inline-block;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent-gold),var(--accent));color:#fff;font-weight:800;font-size:1.1rem;line-height:48px;margin-bottom:16px}
  .cp-method-step h4{font-size:1rem;font-weight:700;margin:0 0 8px;color:var(--dark)}
  .cp-method-step p{margin:0;font-size:.88rem;color:var(--muted);line-height:1.55}

  .cp-cases{display:grid;gap:24px}
  @media (min-width:768px){.cp-cases{grid-template-columns:repeat(3,1fr)}}
  .cp-case{border:1px solid var(--line);border-radius:12px;padding:24px;background:#fff}
  .cp-case-tag{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .cp-case h4{font-size:1rem;font-weight:700;margin:0 0 12px;color:var(--dark);line-height:1.35}
  .cp-case-result{font-size:.85rem;font-weight:600;color:var(--dark);margin-bottom:14px;padding:12px;background:#fafafa;border-radius:8px;border-left:3px solid var(--accent)}
  .cp-case-quote{font-size:.9rem;line-height:1.6;color:var(--muted);margin:0;font-style:italic}
  .cp-case-author{font-size:.8rem;color:var(--muted);margin-top:12px}

  .cp-why{display:grid;gap:32px}
  @media (min-width:768px){.cp-why{grid-template-columns:repeat(3,1fr)}}
  .cp-why-item{text-align:center;padding:0 16px}
  .cp-why-item h4{font-size:1.05rem;font-weight:700;margin:0 0 10px;color:var(--dark)}
  .cp-why-item p{margin:0;font-size:.92rem;color:var(--muted);line-height:1.6}

  .cp-values{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .cp-value{padding:10px 18px;border-radius:999px;background:#f5f5f5;font-size:.88rem;font-weight:600;color:var(--dark)}

  .cp-team-block{margin-bottom:56px}
  .cp-team-block:last-child{margin-bottom:0}
  .cp-team-grid{display:grid;gap:24px;margin-top:32px}
  @media (min-width:640px){.cp-team-grid{grid-template-columns:repeat(2,1fr)}}
  @media (min-width:968px){.cp-team-grid{grid-template-columns:repeat(3,1fr)}}
  .cp-team-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:24px;text-align:center;transition:border-color .2s,box-shadow .2s}
  .cp-team-card:hover{border-color:rgba(52,52,52,.15);box-shadow:0 8px 32px rgba(0,0,0,.06)}
  .cp-team-avatar{position:relative;width:80px;height:80px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--accent-gold),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;letter-spacing:-.02em;overflow:hidden}
  .cp-team-avatar img{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
  .cp-team-avatar .cp-avatar-initials{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.75rem;font-weight:700;color:#fff;letter-spacing:-.02em}
  .cp-team-name{font-size:1.1rem;font-weight:700;color:var(--dark);margin:0 0 4px;letter-spacing:-.02em}
  .cp-team-role{font-size:.9rem;color:var(--muted);margin:0;line-height:1.4}
  .cp-advisors-grid{display:grid;gap:20px;margin-top:32px}
  @media (min-width:500px){.cp-advisors-grid{grid-template-columns:repeat(2,1fr)}}
  @media (min-width:768px){.cp-advisors-grid{grid-template-columns:repeat(3,1fr)}}
  .cp-advisor-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;text-align:center;transition:border-color .2s,box-shadow .2s}
  .cp-advisor-card:hover{border-color:rgba(52,52,52,.15);box-shadow:0 8px 32px rgba(0,0,0,.06)}
  .cp-advisor-avatar{position:relative;width:64px;height:64px;border-radius:50%;margin:0 auto 12px;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:700;color:var(--dark);letter-spacing:-.02em;overflow:hidden}
  .cp-advisor-avatar img{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover}
  .cp-advisor-avatar .cp-avatar-initials{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.35rem;font-weight:700;color:var(--dark);letter-spacing:-.02em}
  .cp-advisor-name{font-size:1rem;font-weight:700;color:var(--dark);margin:0}

  .cp-cta{text-align:center;padding:72px 24px}
  .cp-cta h2{font-size:clamp(1.75rem,3vw,2.25rem);margin:0 0 16px;color:var(--dark);font-weight:800;letter-spacing:-.03em;line-height:1.25}
  .cp-cta p{margin:0 0 28px;color:var(--muted);max-width:440px;margin-left:auto;margin-right:auto;font-size:1rem}
  .cp-cta-buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;align-items:center}
  .cp-form-wrap{max-width:520px;margin:0 auto}
  .cp-lead-form{display:flex;flex-direction:column;gap:16px}
  .cp-form-label{font-size:.9rem;font-weight:600;color:var(--text)}
  .cp-form-input,.cp-form-textarea{padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:1rem;font-family:inherit}
  .cp-form-textarea{resize:vertical;min-height:100px}
  .cp-form-actions{margin-top:8px}
  .cp-form-feedback{margin:12px 0 0;font-size:.95rem}
  .cp-form-feedback--success{color:#0d7d3d}
  .cp-form-feedback--error{color:#9f3333}
  .cp-footer{padding:40px 0 28px;color:var(--muted);font-size:.9rem;border-top:1px solid var(--line);text-align:center}
  .cp-footer p{margin:0 0 4px}
  .cp-footer-links{display:flex;flex-wrap:wrap;gap:12px 20px;justify-content:center;margin-top:12px}
  .cp-footer-links a{color:var(--muted)}
  .cp-footer-links a:hover{color:var(--text)}

  .cp-nav-toggle{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);border:0}
  .cp-nav-hamburger{display:none;flex-shrink:0}
  .cp-nav-hamburger-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text);cursor:pointer;transition:background .2s,border-color .2s}
  .cp-nav-hamburger-btn:hover{background:#f8f8f8;border-color:rgba(52,52,52,.2)}
  .cp-nav-hamburger-btn span{display:block;width:20px;height:2px;background:currentColor;border-radius:1px;transition:background .2s}
  .cp-nav-hamburger-btn span::before,.cp-nav-hamburger-btn span::after{content:"";display:block;width:20px;height:2px;background:currentColor;border-radius:1px;margin-top:5px;transition:transform .2s}
  .cp-nav-hamburger-btn span::after{margin-top:5px}
  .cp-nav-mobile{display:none;position:absolute;left:0;right:0;top:100%;background:#fff;border-bottom:1px solid var(--line);box-shadow:0 12px 32px rgba(0,0,0,.08);z-index:99;padding:16px 24px 24px}
  .cp-nav-mobile a{display:block;padding:14px 0;font-size:1rem;font-weight:500;color:var(--text);border-bottom:1px solid var(--line)}
  .cp-nav-mobile a:last-child{border-bottom:0}
  .cp-nav-mobile-soon{display:block;padding:10px 0 10px 12px;font-size:.95rem;color:var(--muted);border-bottom:1px solid var(--line);opacity:.75}
  .cp-nav-mobile-subtitle{display:block;padding:16px 0 6px;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .cp-nav-mobile .cp-btn{margin-top:16px;width:100%;justify-content:center}

  @media (max-width:967px){
    .cpc{width:min(1100px,calc(100% - 32px));margin-left:auto;margin-right:auto}
    .cp-nav-links{display:none}
    .cp-nav-right{display:none}
    .cp-nav{justify-content:space-between;gap:12px;min-height:56px}
