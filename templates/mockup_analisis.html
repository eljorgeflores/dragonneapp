{# SEO: routes/marketing.py mockup_analisis #}
{% extends 'base.html' %}
{% block body %}
<main class="page-mockup-analisis" id="main">
  <div class="app-shell mockup-shell">
    <header class="app-topbar">
      <div class="mockup-topbar-inner">
        <div>
          <div class="brand">
            <img class="brand-logo app-pullso-logo" style="margin:0" src="/static/branding/pullso-logo.svg" alt="Pullso" width="120" height="30" loading="eager" decoding="async" />
          </div>
          <div class="muted">Hotel Ejemplo · Boutique · Plan Pro+</div>
        </div>
        <div class="top-actions">
          <a href="{{ url_path('/consultoria') }}" class="btn btn-secondary btn-sm">Volver al inicio</a>
        </div>
      </div>
    </header>

    <div class="mockup-demo-container">
      {% include 'partials/demo_resultado_analisis.html' %}
      <p class="muted mockup-footer-cta">Vista de ejemplo. <a href="{{ url_path('/signup') }}">Crear cuenta</a> para análisis reales.</p>
    </div>
  </div>
</main>
{% endblock %}
